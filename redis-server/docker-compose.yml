#  docker-compose -f docker-compose.yml config check validate config
version: "3.8"

services:
  redis-queue:
    image: redis:7-alpine
    container_name: daikin-redis
    restart: always
    ports:
      - "6379:6379" # แก้ไข IP ของคุณ ตัวอย่าง xx.xx.xx.xx ให้ใช้ private ภายในเท่านั้น
    expose:
      - "6379"
    environment:
      - TZ=Asia/Bangkok # หรือเปลี่ยนเป็น UTC ก็ได้ เช่น TZ=UTC
    volumes:
      - redis-data:/data
      # - ./sql/backup.txt:/data/backup.txt
      # - ./sql/daikin.rdb:/data/dump.rdb
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command:
      [
        "redis-server",
        "/usr/local/etc/redis/redis.conf",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    sysctls:
      net.core.somaxconn: 1024
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "json-file" # ใช้ json-file driver (default)
      options:
        max-size: "10m" # จำกัดขนาดของแต่ละไฟล์ log ไม่ให้เกิน 10MB
        max-file: "5" # เก็บไฟล์ log ไว้สูงสุด 5 ไฟล์

volumes:
  #ถ้ามีการใช้ docker-compose ซ้ำ volumes ต้องไม่ซ้ำ
  # โดยเฉพาะ database   เช่น postgresql  vol เป็น sqldata
  #ถ้าซ้ำจะทำให้ ข้อมูลถูกใช้ทับกันครับ ต้อง เปลียนเป้น sqldata2 เป็นต้น
  redis-data:

networks:
  default:
    external: true
    name: proxy-network
