version: "3.8"

services:
  docker-lemp:
    image: adhocore/lemp:7.4
    container_name: docker-lemp
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - 8080:80
    labels:
      - "virtual.host=your_website.com"
      - "virtual.tls-email=your@email.com" # ssl is now on
      - "virtual.port=80" # exposed port of this container
    environment:
      VIRTUAL_HOST: "your_website.com"
      VIRTUAL_PORT: "80"
      LETSENCRYPT_HOST: "your_website.com"
      LETSENCRYPT_EMAIL: "your@email.com"
      MYSQL_ROOT_PASSWORD: toor
      MYSQL_DATABASE: dbname
      MYSQL_USER: dbusr
      MYSQL_PASSWORD: dbpass
      TZ: Asia/Bangkok
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  #ถ้ามีการใช้ docker-compose ซ้ำ volumes ต้องไม่ซ้ำ
  # โดยเฉพาะ database   เช่น postgresql  vol เป็น sqldata
  #ถ้าซ้ำจะทำให้ ข้อมูลถูกใช้ทับกันครับ ต้อง เปลียนเป้น sqldata2 เป็นต้น
  db_data: {}

networks:
  default:
    external: true
    name: proxy-network
