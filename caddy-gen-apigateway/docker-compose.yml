#  docker-compose -f docker-compose.yml config check validate config
version: "3.8"
services:
  # caddy gen for api gateway is a reverse proxy for api gateway
  caddy-gen-apigateway:
    image: "limweb/caddy-gen-apigateway:latest"
    container_name: caddy-gen-apigateway
    restart: "always"
    ports:
      - "80:80"
      - "443:443"
      - "2015:2015"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro # needs socket to read events
      - caddy-info:/data/caddy # needs volume to back up certificates
      - caddy-data:/root/.caddy
    environment:
      - TZ=Asia/Bangkok
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - proxy-network
      - backend-network

  # database form keycloak
  mariadb:
    image: mariadb
    restart: always
    container_name: mariadb
    # ports:
    #   - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    environment:
      TZ: Asia/Bangkok
      MYSQL_ROOT_PASSWORD: tooradminlim7729
      MYSQL_USER: dbuseradminlim7729
      MYSQL_PASSWORD: dbpassadminlim7729
    logging:
      driver: "json-file" # ใช้ json-file driver (default)
      options:
        max-size: "10m" # จำกัดขนาดของแต่ละไฟล์ log ไม่ให้เกิน 10MB
        max-file: "5" # เก็บไฟล์ log ไว้สูงสุด 5 ไฟล์
    networks:
      - backend-network

  # authserver keycloak
  authserver:
    image: quay.io/keycloak/keycloak:latest
    labels:
      - "virtual.host=sso.yourdomain.com" # your domain
      - "virtual.port=8080" # exposed port of this container
      - "virtual.tls=internal" # ssl is now on
      # - "virtual.tls-email=your@email.com" # ssl is now on
      # - "virtual.log.level=debug"
      # - "global.cloudflare=true" # เปิดใช้ trusted_proxies cloudflare
    environment:
      TZ: Asia/Bangkok
      KC_HOSTNAME: sso.yourdomain.com
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_COOKIE_DOMAIN: .yourdomain.com
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_PROXY: edge
      # for Keycloak admin setup
      KEYCLOAK_ADMIN: adminkeycloak
      KEYCLOAK_ADMIN_PASSWORD: keycloak@passwordadmin7729
      # for Keycloak metrics and health checks
      KC_METRICS_ENABLED: true
      KC_HEALTH_ENABLED: true
      KC_LOG_LEVEL: info
      # keycloak database setup
      KC_DB: mariadb
      KC_DB_URL: jdbc:mariadb://mariadb:3306/keycloak
      KC_DB_USERNAME: dbuseradminlim7729
      KC_DB_PASSWORD: dbpassadminlim7729
    command: start-dev
    # command: start --optimized
    volumes:
      - kcmysql_data:/var/lib/mysql
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - proxy-network
      - backend-network

  # api gateway ตัวอย่างสำหรับทดสอบ
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api-service
    image: caddy-gateway-bun-elysia-api:latest # TODO: replace with your actual image name
    labels:
      - "virtual.host=yourapi.yourdomain.com"
      - "virtual.port=3000"
      - "virtual.tls=internal" # ssl inside docker network
      # - "virtual.tls-email=your@email.com" # TODO: สำหรับ ssl จริง
      - "virtual.cors.enabled=true" # ต้องการ เปิด CORS
      - "auth.validatejwt=true" # ต้องการ validate JWT token
      - "auth.server=your-auth-auth.yourdomain.com" # ต้องตรงกับ URL ของ Keycloak
      - "auth.realm=your-app-realm" # ต้องตรงกับ realm ที่สร้างใน Keycloak
      - "auth.clientid=your-app-clientid" # ต้องตรงกับ client id ที่สร้างใน Keycloak
    # env_file:
    #   - ./api/.env
    environment:
      - NODE_ENV=production
      - TZ=Asia/Bangkok
    networks:
      - proxy-network
      - backend-network

  web1:
    build:
      context: ./web1
      dockerfile: Dockerfile
    image: caddy-gateway-web1:latest
    container_name: web1-app
    labels:
      - "virtual.host=web1.yourdomain.com"
      - "virtual.port=8080"
      - "virtual.tls=internal"
      - "virtual.cors.enabled=true"
      - "auth.server=sso.yourdomain.com"
      - "auth.realm=your-app-realm"
      - "auth.clientid=your-appclient-web1"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Bangkok
    networks:
      - proxy-network

  web2:
    build:
      context: ./web2
      dockerfile: Dockerfile
    image: caddy-gateway-web2:latest
    container_name: web2-app
    labels:
      - "virtual.host=web2.yourdomain.com"
      - "virtual.port=8080"
      - "virtual.tls=internal"
      - "auth.server=sso.yourdomain.com"
      - "auth.realm=your-app-realm"
      - "auth.clientid=your-appclient-web2"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Bangkok

volumes:
  caddy-data:
  caddy-info:
  mariadb_data:

networks:
  default:
    external: true
    name: proxy-network # for frontend services

  backend-network:
    driver: bridge # for backend services
