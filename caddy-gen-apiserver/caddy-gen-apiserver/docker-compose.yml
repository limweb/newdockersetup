version: "3.8"
services:
  caddy-gen:
    container_name: caddy-gen-proxy
    image: "limweb/caddy-gen-apigateway:latest" # api gateway reverse proxy
    restart: always
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro # needs socket to read events
      - caddy-info:/data/caddy # log files
      - caddy-data:/etc/caddy # certificates and config (CADDYPATH)
      # - ./Caddyfile.bkp:/code/docker-gen/templates/Caddyfile.bkp # optional: mount custom template
    ports:
      - "80:80"
      - "443:443"
      - "2015"
    environment:
      - TZ=Asia/Bangkok
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
volumes: 
  #ถ้ามีการใช้ docker-compose ซ้ำ volumes ต้องไม่ซ้ำ
  # โดยเฉพาะ database   เช่น postgresql  vol เป็น sqldata
  #ถ้าซ้ำจะทำให้ ข้อมูลถูกใช้ทับกันครับ ต้อง เปลียนเป้น sqldata2 เป็นต้น
  caddy-data:
  caddy-info:

networks:
  default:
    external: true
    name: proxy-network
